version: '3.8'

services:
  database:
    image: postgis/postgis:15-3.3
    container_name: vayusetu_postgis
    environment:
      POSTGRES_DB: vayusetu_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secure_db_password_change_me
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - vayusetu_network

  cache:
    image: redis:7-alpine
    container_name: vayusetu_redis
    ports:
      - "6379:6379"
    networks:
      - vayusetu_network

  backend:
    build:
      context: ./backend
      dockerfile: ../deployment/docker/Dockerfile.backend
    container_name: vayusetu_backend
    volumes:
      - ./backend:/app
      - ./data:/app/data
    environment:
      - DATABASE_URL=postgresql://admin:secure_db_password_change_me@database:5432/vayusetu_db
      - REDIS_URL=redis://cache:6379/0
      - JWT_SECRET=super_secret_jwt_key_to_be_replaced_in_prod
    ports:
      - "8000:8000"
    depends_on:
      - database
      - cache
    networks:
      - vayusetu_network

  frontend:
    build:
      context: ./frontend
      dockerfile: ../deployment/docker/Dockerfile.frontend
    container_name: vayusetu_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - vayusetu_network

volumes:
  pgdata:

networks:
  vayusetu_network:
    driver: bridge
